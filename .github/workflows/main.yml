ame: Github CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Git Checkout
        uses: actions/checkout@v2

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Build
        run: mvn package -Dmaven.test.skip=true

      - name: Unit Test
        run: mvn test
